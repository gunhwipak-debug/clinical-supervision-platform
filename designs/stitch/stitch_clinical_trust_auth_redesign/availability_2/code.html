<body class="bg-background text-on-background min-h-screen font-body-md antialiased flex flex-col">
<!-- TopAppBar -->
<header class="bg-surface text-primary font-headline-lg-mobile text-headline-lg-mobile border-b border-outline-variant flex justify-between items-center px-margin-mobile h-16 w-full fixed top-0 z-50">
<button class="text-on-surface-variant hover:bg-surface-container-low active:scale-95 transition-transform rounded-full p-2 flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="clinical_notes">clinical_notes</span>
</button>
<h1 class="font-bold text-on-background">SupervisionPortal</h1>
<button class="text-on-surface-variant hover:bg-surface-container-low active:scale-95 transition-transform rounded-full p-2 flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-16 pb-24 px-margin-mobile flex flex-col gap-lg mt-md max-w-md mx-auto w-full">
<!-- Page Title & Controls -->
<section class="flex flex-col gap-sm">
<div class="flex justify-between items-center">
<h2 class="font-headline-md text-headline-md text-on-background">일정 관리</h2>
<button class="bg-surface-container-lowest border border-outline-variant text-on-surface-variant px-3 py-1.5 rounded-lg flex items-center gap-2 font-label-md text-label-md active:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-[18px]">calendar_month</span>
                    10월
                </button>
</div>
<p class="font-body-sm text-body-sm text-on-surface-variant">상담 가능한 시간을 요일별로 관리하세요.</p>
</section>
<!-- Compact Weekly Calendar -->
<section class="bg-surface-container-lowest rounded-xl border border-outline-variant p-4">
<div class="flex justify-between items-center text-center">
<!-- Day Inactive -->
<button class="flex flex-col items-center gap-1 p-2 rounded-lg active:scale-95 transition-transform hover:bg-surface-container-low">
<span class="font-label-sm text-label-sm text-on-surface-variant">월</span>
<span class="font-body-md text-body-md text-on-background">14</span>
</button>
<!-- Day Inactive -->
<button class="flex flex-col items-center gap-1 p-2 rounded-lg active:scale-95 transition-transform hover:bg-surface-container-low">
<span class="font-label-sm text-label-sm text-on-surface-variant">화</span>
<span class="font-body-md text-body-md text-on-background">15</span>
</button>
<!-- Day Inactive -->
<button class="flex flex-col items-center gap-1 p-2 rounded-lg active:scale-95 transition-transform hover:bg-surface-container-low">
<span class="font-label-sm text-label-sm text-on-surface-variant">수</span>
<span class="font-body-md text-body-md text-on-background">16</span>
</button>
<!-- Day Active -->
<button class="flex flex-col items-center gap-1 p-2 rounded-lg bg-primary text-on-primary active:scale-95 transition-transform shadow-[0px_4px_10px_-2px_rgba(0,0,0,0.1)]">
<span class="font-label-sm text-label-sm text-on-primary opacity-80">목</span>
<span class="font-headline-md text-[18px] leading-tight font-bold">17</span>
<div class="w-1 h-1 bg-on-primary rounded-full mt-0.5"></div>
</button>
<!-- Day Inactive -->
<button class="flex flex-col items-center gap-1 p-2 rounded-lg active:scale-95 transition-transform hover:bg-surface-container-low">
<span class="font-label-sm text-label-sm text-on-surface-variant">금</span>
<span class="font-body-md text-body-md text-on-background">18</span>
</button>
<!-- Day Inactive -->
<button class="flex flex-col items-center gap-1 p-2 rounded-lg active:scale-95 transition-transform hover:bg-surface-container-low">
<span class="font-label-sm text-label-sm text-on-surface-variant text-error">토</span>
<span class="font-body-md text-body-md text-on-background">19</span>
</button>
<!-- Day Inactive -->
<button class="flex flex-col items-center gap-1 p-2 rounded-lg active:scale-95 transition-transform hover:bg-surface-container-low">
<span class="font-label-sm text-label-sm text-on-surface-variant text-error">일</span>
<span class="font-body-md text-body-md text-on-background">20</span>
</button>
</div>
</section>

<div class="flex justify-between items-end border-b border-outline-variant pb-2">

<span class="font-label-sm text-label-sm text-secondary bg-secondary-fixed px-2 py-0.5 rounded-full">3 슬롯 활성</span>
</div>

<span class="material-symbols-outlined">light_mode</span>
</div>
<div class="flex flex-col">
<span class="font-headline-md text-[20px] text-on-background">10:00 <span class="font-body-md text-on-surface-variant">AM</span></span>

</div>
</div>

<input checked="" class="sr-only peer" type="checkbox" value=""/>

</label>
</article>
<!-- Time Slot Card 2 (Active) -->

</div>
<div class="flex flex-col">

<div class="w-11 h-6 bg-outline-variant rounded-full peer peer-checked:after:translate-x-full peer-checked:bg-secondary after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-surface-container-lowest after:border-outline-variant after:border after:rounded-full after:h-5 after:w-5 after:transition-all"></div>
</label>
</article>

<div class="w-10 h-10 rounded-full bg-surface-container-low flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined">dark_mode</span>
</div>
<div class="flex flex-col">

</label>
