<body class="bg-background text-on-background antialiased pb-24 md:hidden">
<!-- TopAppBar -->
<header class="w-full top-0 sticky bg-surface dark:bg-on-background border-b border-outline-variant dark:border-on-surface-variant flex justify-between items-center px-margin-mobile py-base z-40 transition-colors duration-200 ease-in-out">
<button class="text-on-surface-variant dark:text-outline-variant hover:bg-surface-container-low dark:hover:bg-tertiary-container p-2 rounded-full transition-colors duration-200 ease-in-out">

</button>
<h1 class="font-headline-md text-headline-md font-bold text-secondary dark:text-secondary-fixed-dim">지급 관리</h1>
<button class="text-on-surface-variant dark:text-outline-variant hover:bg-surface-container-low dark:hover:bg-tertiary-container p-2 rounded-full transition-colors duration-200 ease-in-out">
<span class="material-symbols-outlined" data-icon="filter_list">filter_list</span>
</button>
</header>
<!-- Main Content -->
<main class="px-margin-mobile pt-lg pb-xl flex flex-col gap-xl">
<!-- Month Filter -->
<section class="flex items-center justify-between bg-surface-container-lowest border border-outline-variant rounded-lg p-sm">
<button class="p-xs text-on-surface-variant hover:bg-surface-container-low rounded-full transition-colors">
<span class="material-symbols-outlined" data-icon="chevron_left">chevron_left</span>
</button>
<span class="font-label-md text-label-md text-on-surface">2023년 10월</span>
<button class="p-xs text-on-surface-variant hover:bg-surface-container-low rounded-full transition-colors">
<span class="material-symbols-outlined" data-icon="chevron_right">chevron_right</span>
</button>
</section>
<!-- Summary Card -->
<section class="bg-surface-container-lowest border border-outline-variant rounded-xl p-md flex flex-col gap-sm shadow-sm relative overflow-hidden">
<!-- Subtle gradient background for high-end feel -->
<div class="absolute inset-0 bg-gradient-to-br from-surface-container-low to-surface-container-lowest opacity-50 pointer-events-none"></div>
<div class="relative z-10 flex flex-col gap-xs">
<h2 class="font-body-sm text-body-sm text-on-surface-variant">총 지급 예정 금액</h2>
<div class="flex items-baseline gap-xs">
<span class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">₩12,500,000</span>
</div>
</div>
<div class="relative z-10 flex items-center justify-between pt-sm border-t border-outline-variant border-opacity-50">
<span class="font-body-sm text-body-sm text-on-surface-variant">총 건수</span>
<span class="font-label-md text-label-md text-on-surface">15건</span>
</div>
</section>

<h3 class="font-label-md text-label-md text-on-surface border-b border-outline-variant pb-xs">예정된 지급</h3>
<!-- List Item 1 -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg p-sm flex justify-between items-center hover:bg-surface-container-low transition-colors duration-200">
<div class="flex flex-col gap-xs">
<span class="font-label-md text-label-md text-on-surface">김지수 상담사</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">10월 25일 예정</span>
</div>
<div class="flex flex-col items-end gap-xs">
<span class="font-body-md text-body-md font-semibold text-on-surface">₩1,200,000</span>
<span class="bg-surface-container-highest text-on-surface-variant font-label-sm text-label-sm px-2 py-1 rounded-full">예정됨</span>
</div>
</div>
<!-- List Item 2 -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg p-sm flex justify-between items-center hover:bg-surface-container-low transition-colors duration-200">

<div class="flex flex-col items-end gap-xs">

<span class="bg-[#EFF6FF] text-[#1E293B] font-label-sm text-label-sm px-2 py-1 rounded-full border border-[#E2E8F0]">지급 완료</span>
</div>
</div>
<!-- List Item 3 -->

<div class="flex flex-col items-end gap-xs">
<span class="font-body-md text-body-md font-semibold text-on-surface">₩2,100,000</span>
<span class="bg-surface-container-highest text-on-surface-variant font-label-sm text-label-sm px-2 py-1 rounded-full">예정됨</span>

</div>

<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center pt-xs pb-sm px-base bg-surface-container-lowest dark:bg-on-background z-50 border-t border-outline-variant dark:border-on-surface-variant mobile-only">
