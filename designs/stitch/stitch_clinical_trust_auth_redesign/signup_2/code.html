<!DOCTYPE html>

<style>
        .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }
        
        /* Checkbox styling */
        .custom-checkbox {
            appearance: none;
            background-color: #fff;
            margin: 0;
            font: inherit;
            color: currentColor;
            width: 24px;
            height: 24px;
            border: 1px solid #E2E8F0;
            border-radius: 4px;
            display: grid;
            place-content: center;
            cursor: pointer;
        }

        .custom-checkbox::before {
            content: "";
            width: 14px;
            height: 14px;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em white;
            background-color: white;
            transform-origin: center;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }

        .custom-checkbox:checked {
            background-color: #0F172A;
            border-color: #0F172A;
        }

        .custom-checkbox:checked::before {
            transform: scale(1);
        }
        
        body {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface text-on-surface font-body-md antialiased w-full max-w-[390px] mx-auto min-h-screen flex flex-col relative overflow-x-hidden">
<!-- Top App Bar (Simplified for transactional intent) -->
<header class="w-full flex items-center justify-between px-margin-mobile h-16 sticky top-0 bg-surface/90 backdrop-blur-md z-50">
<button aria-label="Go back" class="p-2 -ml-2 text-on-surface hover:bg-surface-container-low rounded-full transition-colors" type="button">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="font-headline-md text-headline-md font-bold text-primary tracking-tight">ClinicalSup</div>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col px-margin-mobile pt-sm pb-xl">
<!-- Header Section -->
<div class="mb-lg">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary mb-xs">Create Account</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Join the secure clinical supervision platform.</p>
</div>
<!-- Form Section -->
<form class="flex flex-col gap-lg" onsubmit="event.preventDefault();">
<!-- Personal Information Group -->
<fieldset class="flex flex-col gap-md bg-surface-container-lowest p-md rounded-xl border border-outline-variant shadow-sm">
<legend class="sr-only">Personal Information</legend>
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface" for="fullName">Full Name</label>
<input class="w-full h-12 px-sm border border-outline-variant rounded bg-surface-container-lowest font-body-md text-body-md text-on-surface focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-colors" id="fullName" name="fullName" placeholder="Dr. Jane Doe" required="" type="text"/>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface" for="email">Work Email</label>
<input class="w-full h-12 px-sm border border-outline-variant rounded bg-surface-container-lowest font-body-md text-body-md text-on-surface focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-colors" id="email" name="email" placeholder="jane.doe@clinic.com" required="" type="email"/>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface" for="password">Password</label>
<div class="relative w-full">
<input class="w-full h-12 pl-sm pr-12 border border-outline-variant rounded bg-surface-container-lowest font-body-md text-body-md text-on-surface focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-colors" id="password" name="password" placeholder="Min. 8 characters" required="" type="password"/>
<button class="absolute right-sm top-1/2 -translate-y-1/2 text-on-surface-variant p-1 flex items-center justify-center" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
</fieldset>
<!-- Professional Details Group -->
<fieldset class="flex flex-col gap-md bg-surface-container-lowest p-md rounded-xl border border-outline-variant shadow-sm">
<legend class="sr-only">Professional Details</legend>
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface" for="role">Clinical Role</label>
<div class="relative w-full">
<select class="w-full h-12 px-sm appearance-none border border-outline-variant rounded bg-surface-container-lowest font-body-md text-body-md text-on-surface focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-colors" id="role" name="role" required="">
<option disabled="" selected="" value="">Select your role</option>
<option value="supervisor">Supervisor</option>
<option value="supervisee">Supervisee</option>
<option value="admin">Clinic Admin</option>
</select>
<span class="material-symbols-outlined absolute right-sm top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface" for="license">License Number (Optional)</label>
<input class="w-full h-12 px-sm border border-outline-variant rounded bg-surface-container-lowest font-body-md text-body-md text-on-surface focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-colors" id="license" name="license" placeholder="e.g. KR-123456" type="text"/>
</div>
</fieldset>
<!-- Terms and Agreements -->
<div class="flex flex-col gap-sm mt-xs">
<label class="flex items-start gap-sm p-xs -ml-xs cursor-pointer group">
<div class="pt-[2px]">
<input class="custom-checkbox" id="termsAll" type="checkbox"/>
</div>
<div class="flex-1 flex flex-col">
<span class="font-label-md text-label-md text-on-surface group-hover:text-primary transition-colors">Agree to all Terms</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">Includes Terms of Service, Privacy Policy, and HIPAA Consent.</span>
</div>
</label>
<div class="pl-[38px] flex flex-col gap-sm border-l-2 border-surface-container ml-[9px]">
<label class="flex items-center gap-sm py-1 cursor-pointer">
<input class="custom-checkbox w-5 h-5 before:w-3 before:h-3" name="terms_service" type="checkbox"/>
<span class="font-body-sm text-body-sm text-on-surface">Terms of Service (Required)</span>
<button class="ml-auto text-secondary text-[12px] font-semibold underline underline-offset-2" type="button">View</button>
</label>
<label class="flex items-center gap-sm py-1 cursor-pointer">
<input class="custom-checkbox w-5 h-5 before:w-3 before:h-3" name="privacy_policy" type="checkbox"/>
<span class="font-body-sm text-body-sm text-on-surface">Privacy Policy (Required)</span>
<button class="ml-auto text-secondary text-[12px] font-semibold underline underline-offset-2" type="button">View</button>
</label>
<label class="flex items-center gap-sm py-1 cursor-pointer">
<input class="custom-checkbox w-5 h-5 before:w-3 before:h-3" name="hipaa_consent" type="checkbox"/>
<span class="font-body-sm text-body-sm text-on-surface">PHI/HIPAA Consent (Required)</span>
<button class="ml-auto text-secondary text-[12px] font-semibold underline underline-offset-2" type="button">View</button>
</label>
</div>
</div>
<!-- Actions -->
<div class="mt-md flex flex-col gap-sm">
<button class="w-full h-12 bg-primary text-on-primary font-label-md text-label-md rounded-lg flex items-center justify-center hover:bg-opacity-90 transition-opacity focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary" type="submit">
                    Create Account
                </button>
<div class="text-center font-body-sm text-body-sm text-on-surface-variant mt-sm">
                    Already have an account? <a class="font-label-md text-label-md text-secondary hover:underline underline-offset-2" href="#">Log in</a>
</div>
</div>
</form>
</main>
<script>
        // Simple JS for 'Agree to All' checkbox logic
        document.addEventListener('DOMContentLoaded', () => {
            const selectAll = document.getElementById('termsAll');
            const individualCheckboxes = document.querySelectorAll('input[type="checkbox"]:not(#termsAll)');

            if(selectAll && individualCheckboxes.length > 0) {
                selectAll.addEventListener('change', (e) => {
                    individualCheckboxes.forEach(cb => {
                        cb.checked = e.target.checked;
                    });
                });

                individualCheckboxes.forEach(cb => {
                    cb.addEventListener('change', () => {
                        const allChecked = Array.from(individualCheckboxes).every(c => c.checked);
                        const someChecked = Array.from(individualCheckboxes).some(c => c.checked);
                        
                        selectAll.checked = allChecked;
                        selectAll.indeterminate = someChecked && !allChecked;
                    });
                });
            }
        });
    </script>
</body></html>
