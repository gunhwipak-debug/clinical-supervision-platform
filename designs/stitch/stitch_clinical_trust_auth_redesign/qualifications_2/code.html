    }

<body class="bg-background text-on-background antialiased md:hidden pb-24">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-on-background w-full top-0 sticky border-b border-outline-variant dark:border-on-surface-variant z-40">
<div class="flex justify-between items-center px-margin-mobile py-base w-full">
<button class="text-secondary dark:text-secondary-fixed-dim hover:bg-surface-container-low dark:hover:bg-tertiary-container transition-colors duration-200 ease-in-out p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-secondary dark:text-secondary-fixed-dim">ClinicalSup</h1>
<button class="text-secondary dark:text-secondary-fixed-dim hover:bg-surface-container-low dark:hover:bg-tertiary-container transition-colors duration-200 ease-in-out p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</div>
</header>
<main class="px-margin-mobile pt-lg pb-xl flex flex-col gap-lg">
<!-- Header Section -->
<div>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-background mb-xs">자격 관리</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant">슈퍼바이저 신청 내역을 검토하고 승인하세요.</p>
</div>
<!-- Search & Filter -->
<div class="flex flex-col gap-sm">
<div class="relative w-full">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant" data-icon="search">search</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-sm pl-10 pr-sm font-body-sm text-body-sm text-on-background focus:border-secondary focus:ring-1 focus:ring-secondary transition-all outline-none" placeholder="신청자 이름 검색..." type="text"/>
</div>
<div class="flex gap-2 overflow-x-auto pb-1 scrollbar-hide">
<button class="whitespace-nowrap px-4 py-2 bg-secondary-container text-on-secondary-container rounded-full font-label-md text-label-md border border-transparent">전체보기</button>
<button class="whitespace-nowrap px-4 py-2 bg-surface-container-lowest text-on-surface-variant rounded-full font-label-md text-label-md border border-outline-variant hover:bg-surface-container-low transition-colors">대기 중</button>
<button class="whitespace-nowrap px-4 py-2 bg-surface-container-lowest text-on-surface-variant rounded-full font-label-md text-label-md border border-outline-variant hover:bg-surface-container-low transition-colors">승인됨</button>
<button class="whitespace-nowrap px-4 py-2 bg-surface-container-lowest text-on-surface-variant rounded-full font-label-md text-label-md border border-outline-variant hover:bg-surface-container-low transition-colors">반려됨</button>
</div>
</div>
<!-- Pending Qualifications List -->
<div class="flex flex-col gap-md">
<!-- Card 1 -->
<div class="bg-surface-container-lowest rounded-lg border border-outline-variant p-md flex flex-col gap-sm">
<div class="flex justify-between items-start">
<div>
<div class="flex items-center gap-2 mb-1">
<span class="px-2 py-1 bg-surface-container-low text-on-surface-variant rounded-sm font-label-sm text-label-sm border border-outline-variant">대기 중</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">2023-10-24 제출</span>
</div>
<h3 class="font-headline-md text-headline-md text-on-background">김민수</h3>
<p class="font-body-sm text-body-sm text-secondary font-medium">임상심리전문가</p>
</div>
</div>
<div class="mt-xs pt-sm border-t border-outline-variant/50 flex justify-end">
<button class="px-4 py-2 bg-primary text-on-primary rounded font-label-md text-label-md hover:bg-primary/90 transition-colors">검토하기</button>
</div>
</div>
<!-- Card 2 -->
<div class="bg-surface-container-lowest rounded-lg border border-outline-variant p-md flex flex-col gap-sm">
<div class="flex justify-between items-start">
<div>

<span class="px-2 py-1 bg-surface-container-low text-on-surface-variant rounded-sm font-label-sm text-label-sm border border-outline-variant">대기 중</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">2023-10-23 제출</span>
</div>
<h3 class="font-headline-md text-headline-md text-on-background">이지은</h3>
<p class="font-body-sm text-body-sm text-secondary font-medium">상담심리사 1급</p>
</div>
</div>
<div class="mt-xs pt-sm border-t border-outline-variant/50 flex justify-end">
<button class="px-4 py-2 bg-primary text-on-primary rounded font-label-md text-label-md hover:bg-primary/90 transition-colors">검토하기</button>
</div>
</div>
<!-- Card 3 - Approved -->
<div class="bg-surface-container-lowest rounded-lg border border-outline-variant p-md flex flex-col gap-sm opacity-80">
<div class="flex justify-between items-start">
<div>
<div class="flex items-center gap-2 mb-1">
<span class="px-2 py-1 bg-surface-container text-secondary rounded-sm font-label-sm text-label-sm border border-secondary-fixed">승인됨</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">2023-10-20 제출</span>
</div>
<h3 class="font-headline-md text-headline-md text-on-background">박상철</h3>
<p class="font-body-sm text-body-sm text-secondary font-medium">정신건강임상심리사</p>
</div>
</div>

<button class="px-4 py-2 bg-surface-container-lowest text-on-background border border-outline-variant rounded font-label-md text-label-md hover:bg-surface-container-low transition-colors">상세보기</button>
</div>

<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
<span class="font-label-sm text-label-sm mt-1">Dashboard</span>
</a>
<a class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container dark:bg-secondary dark:text-on-secondary rounded-full px-4 py-1 scale-95 active:scale-90 transition-transform duration-150" href="#">
<span class="material-symbols-outlined" data-icon="pending_actions" data-weight="fill" style="font-variation-settings: 'FILL' 1;">pending_actions</span>
