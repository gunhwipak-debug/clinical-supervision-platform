<body class="bg-background text-on-background font-body-md min-h-screen pb-24">
<!-- TopNavBar -->
<header class="fixed top-0 w-full z-50 bg-surface px-margin-mobile flex justify-between items-center h-16 border-b border-outline-variant">
<div class="flex items-center gap-sm">
<span class="font-headline-md text-headline-md font-bold text-primary">ClinicFlow</span>
</div>
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-on-surface-variant cursor-pointer active:opacity-80">search</span>
<span class="material-symbols-outlined text-on-surface-variant cursor-pointer active:opacity-80">notifications</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="pt-16 px-margin-mobile">
<!-- Header & Action -->
<div class="py-md flex justify-between items-end">
<div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">요청 내역</h1>
</div>
<button class="bg-primary text-on-primary font-label-md text-label-md px-4 py-2 rounded flex items-center gap-xs active:opacity-80 transition-opacity shadow-sm">
<span class="material-symbols-outlined" style="font-size: 18px;">add</span>
                새 요청
            </button>
</div>
<!-- Status Tabs -->
<div class="flex gap-md border-b border-outline-variant mb-md overflow-x-auto no-scrollbar pb-xs">
<button class="font-label-md text-label-md text-secondary border-b-2 border-secondary pb-1 whitespace-nowrap">전체</button>
<button class="font-label-md text-label-md text-on-surface-variant pb-1 whitespace-nowrap">대기 중</button>
<button class="font-label-md text-label-md text-on-surface-variant pb-1 whitespace-nowrap">진행 중</button>
<button class="font-label-md text-label-md text-on-surface-variant pb-1 whitespace-nowrap">완료됨</button>
</div>
<!-- Requests List -->
<div class="flex flex-col gap-sm">
<!-- Request Card 1 (Pending) -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg p-md">
<div class="flex justify-between items-start mb-sm">
<div>
<div class="font-label-sm text-label-sm text-on-surface-variant mb-xs">임상 평가 지도</div>
<div class="font-headline-md text-headline-md text-on-surface text-[18px]">김수퍼바이저</div>
</div>
<span class="bg-surface-container-high text-on-surface font-label-sm text-label-sm px-2 py-1 rounded-full">대기 중</span>
</div>
<div class="border-t border-outline-variant pt-sm flex justify-between items-center">
<div class="flex items-center gap-xs text-on-surface-variant">
<span class="material-symbols-outlined" style="font-size: 16px;">calendar_today</span>
<span class="font-body-sm text-body-sm">2024.05.20</span>
</div>
<button class="text-secondary font-label-sm text-label-sm flex items-center">
                        상세 보기 <span class="material-symbols-outlined" style="font-size: 16px;">chevron_right</span>
</button>
</div>
</div>
<!-- Request Card 2 (Ongoing) -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg p-md">
<div class="flex justify-between items-start mb-sm">
<div>
<div class="font-label-sm text-label-sm text-on-surface-variant mb-xs">사례 분석 (심화)</div>
<div class="font-headline-md text-headline-md text-on-surface text-[18px]">이박사</div>
</div>
<span class="bg-[#EFF6FF] text-[#1E293B] font-label-sm text-label-sm px-2 py-1 rounded-full border border-[#E2E8F0]">진행 중</span>
</div>
<div class="border-t border-outline-variant pt-sm flex justify-between items-center">
<div class="flex items-center gap-xs text-on-surface-variant">
<span class="material-symbols-outlined" style="font-size: 16px;">calendar_today</span>
<span class="font-body-sm text-body-sm">2024.05.15</span>
</div>
<button class="text-secondary font-label-sm text-label-sm flex items-center">
                        상세 보기 <span class="material-symbols-outlined" style="font-size: 16px;">chevron_right</span>
</button>
</div>
</div>
<!-- Request Card 3 (Completed) -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg p-md opacity-70">
<div class="flex justify-between items-start mb-sm">
<div>
<div class="font-label-sm text-label-sm text-on-surface-variant mb-xs">기초 상담 기법</div>
<div class="font-headline-md text-headline-md text-on-surface text-[18px]">박멘토</div>
</div>
<span class="bg-surface-container-low text-on-surface-variant font-label-sm text-label-sm px-2 py-1 rounded-full">완료됨</span>
</div>
<div class="border-t border-outline-variant pt-sm flex justify-between items-center">
<div class="flex items-center gap-xs text-on-surface-variant">
<span class="material-symbols-outlined" style="font-size: 16px;">calendar_today</span>
<span class="font-body-sm text-body-sm">2024.04.28</span>
</div>
<button class="text-on-surface-variant font-label-sm text-label-sm flex items-center">
                        기록 보기 <span class="material-symbols-outlined" style="font-size: 16px;">chevron_right</span>
</button>
</div>
</div>
</div>
</main>
