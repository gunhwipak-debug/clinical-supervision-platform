<body class="bg-background text-on-background min-h-[884px] flex flex-col relative overflow-hidden font-body-md antialiased">
<!-- Ambient Background Element -->
<div class="absolute top-0 right-0 w-[300px] h-[300px] bg-primary-fixed rounded-full mix-blend-multiply filter blur-[80px] opacity-40 -translate-y-1/3 translate-x-1/3 pointer-events-none"></div>
<!-- Main Content Container -->
<main class="flex-1 flex flex-col justify-center px-margin-mobile py-xl w-full max-w-md mx-auto relative z-10">
<!-- Brand Header -->
<div class="flex items-center gap-2 mb-xl">
<span class="material-symbols-outlined text-primary text-[28px]" style="font-variation-settings: 'FILL' 1;">medical_services</span>
<span class="font-headline-md text-headline-md font-bold text-primary">ClinicalSup</span>
</div>
<!-- Typography Context -->
<div class="mb-lg">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-background mb-xs">비밀번호 찾기</h1>
<p class="font-body-md text-body-md text-on-surface-variant">가입 시 사용한 이메일 주소를 입력해 주세요. 안전한 비밀번호 재설정 링크를 보내드립니다.</p>
</div>
<!-- Form Canvas (Level 1 Surface) -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-md">
<form action="#" class="flex flex-col gap-lg" method="POST">
<!-- Email Input Group -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="email">이메일 주소</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-sm pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-[20px]">mail</span>
</span>
<input class="w-full pl-xl pr-md py-sm bg-surface font-body-md text-body-md text-on-surface border border-outline-variant rounded-DEFAULT focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-all placeholder:text-on-surface-variant/50" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<!-- Security Helper Banner -->
<div class="flex items-start gap-sm bg-surface-container-low p-sm rounded-lg border border-surface-variant">
<span class="material-symbols-outlined text-secondary text-[20px] mt-0.5" style="font-variation-settings: 'FILL' 1;">shield_lock</span>
<p class="font-body-sm text-body-sm text-on-surface-variant">
                        임상 데이터 보호를 위해 재설정 링크는 <strong class="text-on-surface font-medium">24시간 동안만 유효</strong>하며, 본인 인증 후 변경이 완료됩니다.
                    </p>
</div>
<!-- Actions -->
<div class="flex flex-col gap-sm mt-xs">
<button class="w-full flex items-center justify-center gap-2 bg-primary text-on-primary font-label-md text-label-md py-sm px-md rounded-lg hover:bg-on-background transition-colors active:scale-[0.98]" type="submit">
<span>재설정 링크 전송</span>
<span class="material-symbols-outlined text-[18px]">send</span>
</button>
<a class="w-full flex items-center justify-center gap-2 bg-transparent text-secondary font-label-md text-label-md py-sm px-md rounded-lg border border-transparent hover:bg-surface-container hover:border-surface-variant transition-colors" href="#">
<span class="material-symbols-outlined text-[18px]">arrow_back</span>
<span>로그인으로 돌아가기</span>
</a>
</div>
</form>
</div>
</main>
<!-- Subtle interactive script for input focus effect (optional micro-interaction) -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const emailInput = document.getElementById('email');
            const iconSpan = emailInput.previousElementSibling.querySelector('span');

            emailInput.addEventListener('focus', () => {
                iconSpan.classList.remove('text-on-surface-variant');
                iconSpan.classList.add('text-secondary');
            });

            emailInput.addEventListener('blur', () => {
                iconSpan.classList.remove('text-secondary');
                iconSpan.classList.add('text-on-surface-variant');
            });
        });
    </script>
</body></html>
