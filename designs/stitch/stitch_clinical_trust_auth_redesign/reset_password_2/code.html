<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom scrollbar for webkit to match aesthetics */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #c6c6cd;
            border-radius: 4px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-high flex justify-center min-h-screen">
<!-- Mobile Device Container (Max width 390px for preview, acts as full screen on actual device) -->
<main class="w-full max-w-[390px] min-h-screen bg-background shadow-lg relative flex flex-col overflow-hidden">
<!-- TopAppBar (From JSON, modified for focused task flow: replacing menu with back arrow, hiding trailing icon) -->
<header class="bg-surface-container-lowest border-b border-outline-variant flex justify-between items-center w-full px-margin-mobile h-14 shrink-0 z-10 sticky top-0">
<button aria-label="뒤로 가기" class="text-on-surface-variant hover:bg-surface-container-low transition-colors rounded-full p-1 active:scale-95 flex items-center justify-center">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-headline-md-mobile font-headline-md font-bold text-on-surface">비밀번호 재설정</h1>
<!-- Placeholder to balance the flex space, keeping title centered -->
<div class="w-8"></div>
</header>
<!-- Main Content Canvas -->
<div class="flex-1 overflow-y-auto px-margin-mobile py-lg flex flex-col gap-lg">
<!-- Security Guidance Box -->
<div class="bg-surface-container-low border border-outline-variant rounded-lg p-md flex items-start gap-sm">
<span class="material-symbols-outlined text-secondary shrink-0" data-weight="fill" style="font-variation-settings: 'FILL' 1;">shield_lock</span>
<p class="text-body-sm font-body-sm text-on-surface-variant pt-xs">
                    새로운 비밀번호는 8자 이상, 영문/숫자/특수문자를 포함해야 합니다.
                </p>
</div>
<!-- Password Reset Form -->
<form class="flex flex-col gap-md" onsubmit="event.preventDefault();">
<!-- Current Password -->
<div class="flex flex-col gap-xs">
<label class="text-label-md font-label-md text-on-surface" for="current-password">현재 비밀번호</label>
<div class="relative flex items-center">
<input class="w-full h-12 px-sm py-2 bg-surface-container-lowest border border-outline-variant rounded-DEFAULT text-body-md font-body-md text-on-surface focus:outline-none focus:border-2 focus:border-secondary transition-colors pr-10" id="current-password" placeholder="현재 비밀번호를 입력하세요" type="password"/>
<button aria-label="비밀번호 표시 토글" class="absolute right-sm text-outline hover:text-on-surface transition-colors flex items-center justify-center toggle-password" data-target="current-password" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- New Password -->
<div class="flex flex-col gap-xs">
<label class="text-label-md font-label-md text-on-surface" for="new-password">새 비밀번호</label>
<div class="relative flex items-center">
<input class="w-full h-12 px-sm py-2 bg-surface-container-lowest border border-outline-variant rounded-DEFAULT text-body-md font-body-md text-on-surface focus:outline-none focus:border-2 focus:border-secondary transition-colors pr-10" id="new-password" placeholder="새 비밀번호를 입력하세요" type="password"/>
<button aria-label="비밀번호 표시 토글" class="absolute right-sm text-outline hover:text-on-surface transition-colors flex items-center justify-center toggle-password" data-target="new-password" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Confirm New Password -->
<div class="flex flex-col gap-xs">
<label class="text-label-md font-label-md text-on-surface" for="confirm-password">새 비밀번호 확인</label>
<div class="relative flex items-center">
<input class="w-full h-12 px-sm py-2 bg-surface-container-lowest border border-outline-variant rounded-DEFAULT text-body-md font-body-md text-on-surface focus:outline-none focus:border-2 focus:border-secondary transition-colors pr-10" id="confirm-password" placeholder="새 비밀번호를 다시 입력하세요" type="password"/>
<button aria-label="비밀번호 표시 토글" class="absolute right-sm text-outline hover:text-on-surface transition-colors flex items-center justify-center toggle-password" data-target="confirm-password" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Spacer to push CTA slightly down if needed, or margin top -->
<div class="mt-md">
<!-- Primary CTA -->
<button class="w-full h-12 bg-primary text-on-primary rounded-DEFAULT text-label-md font-label-md flex items-center justify-center active:scale-[0.98] transition-transform shadow-sm hover:bg-opacity-90" type="submit">
                        비밀번호 변경하기
                    </button>
</div>
</form>
</div>
</main>
<script>
        // Simple inline script for toggling password visibility
        document.querySelectorAll('.toggle-password').forEach(button => {
            button.addEventListener('click', function() {
                const targetId = this.getAttribute('data-target');
                const input = document.getElementById(targetId);
                const icon = this.querySelector('.material-symbols-outlined');
                
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.textContent = 'visibility';
                } else {
                    input.type = 'password';
                    icon.textContent = 'visibility_off';
                }
            });
        });
    </script>
</body></html>
