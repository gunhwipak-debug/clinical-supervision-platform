<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased md:hidden max-w-[390px] mx-auto overflow-x-hidden relative">
<!-- Top Navigation (Transactional Layout - Hidden Links) -->
<header class="bg-surface docked full-width top-0 border-b border-outline-variant flat no shadows">
<div class="flex justify-between items-center w-full px-margin-mobile max-w-container-max mx-auto h-16">
<div class="flex items-center gap-2">
<a class="font-headline-md text-headline-md font-bold text-primary" href="#">
                    ClinicalSup
                </a>
</div>
<!-- Back action since it's a transactional flow -->
<button class="p-2 text-on-surface-variant hover:bg-surface-container-low rounded-full transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile py-xl">
<!-- Illustration -->
<div class="w-32 h-32 rounded-full bg-surface-container-high flex items-center justify-center mb-lg relative">
<span class="material-symbols-outlined text-secondary text-5xl" style="font-variation-settings: 'FILL' 1; font-size: 64px;">mark_email_unread</span>
<!-- Decorative elements -->
<div class="absolute top-0 right-0 w-8 h-8 bg-surface-bright rounded-full flex items-center justify-center shadow-sm border border-outline-variant transform translate-x-1/4 -translate-y-1/4">
<span class="material-symbols-outlined text-secondary text-sm" style="font-variation-settings: 'FILL' 1;">verified</span>
</div>
</div>
<!-- Text Content -->
<div class="text-center mb-xl">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-sm">이메일 인증 안내</h1>
<p class="font-body-md text-body-md text-on-surface-variant">
                안전한 서비스 이용을 위해 이메일 인증이 필요합니다.<br/>
<strong class="text-primary font-semibold">user@hospital.kr</strong> 으로<br/>
                인증 메일을 발송했습니다.
            </p>
</div>
<!-- Action Buttons -->
<div class="w-full flex flex-col gap-sm">
<button class="w-full bg-primary text-on-primary font-label-md text-label-md py-4 rounded-lg flex items-center justify-center gap-2 hover:opacity-90 transition-opacity">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">open_in_new</span>
                이메일 앱 열기
            </button>
<button class="w-full bg-transparent border border-outline-variant text-on-surface font-label-md text-label-md py-4 rounded-lg flex items-center justify-center gap-2 hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">refresh</span>
                인증 메일 다시 보내기
            </button>
</div>
<!-- Resend Prompt -->
<div class="mt-lg text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                메일을 받지 못하셨나요? 스팸함을 확인하시거나 <br/>
<a class="text-secondary font-medium hover:underline" href="#">고객센터</a>로 문의해주세요.
            </p>
</div>
<!-- Security Badges from SCREEN_19 -->
<div class="mt-xl w-full flex items-center justify-center gap-lg py-sm border-t border-outline-variant">
<div class="flex items-center gap-xs text-on-surface-variant opacity-80">
<span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1;">shield</span>
<span class="font-label-sm text-label-sm">HIPAA Compliant</span>
</div>
<div class="flex items-center gap-xs text-on-surface-variant opacity-80">
<span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1;">lock</span>
<span class="font-label-sm text-label-sm">Secure Data</span>
</div>
</div>
