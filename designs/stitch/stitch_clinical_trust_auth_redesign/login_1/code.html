<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>로그인 - Clinical Supervision Platform</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "inverse-primary": "#bec6e0",
                    "surface-container-lowest": "#ffffff",
                    "secondary-fixed": "#d8e2ff",
                    "on-tertiary-fixed-variant": "#40484f",
                    "tertiary-fixed": "#dce3ec",
                    "background": "#f9f9ff",
                    "surface-tint": "#565e74",
                    "surface-container-high": "#dee8ff",
                    "on-tertiary-container": "#7d858d",
                    "on-secondary-container": "#fefcff",
                    "primary-container": "#131b2e",
                    "on-tertiary-fixed": "#151c23",
                    "on-primary-fixed": "#131b2e",
                    "tertiary": "#000000",
                    "secondary": "#0058be",
                    "secondary-fixed-dim": "#adc6ff",
                    "primary-fixed": "#dae2fd",
                    "surface-dim": "#cfdaf2",
                    "on-secondary-fixed-variant": "#004395",
                    "inverse-surface": "#263143",
                    "on-primary-container": "#7c839b",
                    "secondary-container": "#2170e4",
                    "surface-container-highest": "#d8e3fb",
                    "outline-variant": "#c6c6cd",
                    "primary": "#000000",
                    "on-surface": "#111c2d",
                    "error": "#ba1a1a",
                    "inverse-on-surface": "#ecf1ff",
                    "tertiary-fixed-dim": "#c0c7d0",
                    "on-tertiary": "#ffffff",
                    "on-primary-fixed-variant": "#3f465c",
                    "on-surface-variant": "#45464d",
                    "surface": "#f9f9ff",
                    "surface-variant": "#d8e3fb",
                    "on-error-container": "#93000a",
                    "outline": "#76777d",
                    "error-container": "#ffdad6",
                    "on-background": "#111c2d",
                    "tertiary-container": "#151c23",
                    "surface-container-low": "#f0f3ff",
                    "on-error": "#ffffff",
                    "primary-fixed-dim": "#bec6e0",
                    "on-secondary": "#ffffff",
                    "on-primary": "#ffffff",
                    "surface-bright": "#f9f9ff",
                    "surface-container": "#e7eeff",
                    "on-secondary-fixed": "#001a42"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "margin-mobile": "16px",
                    "gutter": "24px",
                    "xl": "40px",
                    "base": "8px",
                    "sm": "12px",
                    "md": "16px",
                    "lg": "24px",
                    "container-max": "1280px",
                    "xs": "4px"
            },
            "fontFamily": {
                    "headline-lg": ["Hanken Grotesk"],
                    "body-lg": ["Inter"],
                    "headline-md": ["Hanken Grotesk"],
                    "headline-lg-mobile": ["Hanken Grotesk"],
                    "label-md": ["Inter"],
                    "body-sm": ["Inter"],
                    "label-sm": ["Inter"],
                    "body-md": ["Inter"],
                    "display-lg": ["Hanken Grotesk"]
            },
            "fontSize": {
                    "headline-lg": ["32px", {"lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "headline-md": ["24px", {"lineHeight": "1.4", "fontWeight": "600"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                    "label-md": ["14px", {"lineHeight": "1", "letterSpacing": "0.01em", "fontWeight": "600"}],
                    "body-sm": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "label-sm": ["12px", {"lineHeight": "1", "fontWeight": "500"}],
                    "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "display-lg": ["48px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}]
            }
          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom subtle pattern background for a professional SaaS feel */
        .bg-pattern {
            background-color: #f9f9ff;
            background-image: radial-gradient(#d8e3fb 1px, transparent 1px);
            background-size: 24px 24px;
        }
    </style>
</head>
<body class="bg-pattern min-h-screen flex flex-col justify-center items-center p-margin-mobile text-on-surface antialiased">
<!-- Main Centered Container (Level 2 Elevation equivalent via shadow rule) -->
<main class="w-full max-w-[420px] bg-surface-container-lowest border border-outline-variant rounded-xl shadow-[0_10px_15px_-3px_rgba(15,23,42,0.08)] relative z-10 overflow-hidden">
<!-- Header Section -->
<div class="px-xl pt-xl pb-lg text-center">
<div class="inline-flex items-center justify-center w-12 h-12 rounded-lg bg-surface-container-high text-secondary mb-sm">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">medical_information</span>
</div>
<h1 class="font-headline-md text-headline-md text-primary mb-xs">환영합니다</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">임상 감독 플랫폼에 로그인하여 세션을 관리하세요.</p>
</div>
<!-- Login Form -->
<form class="px-xl pb-xl" onsubmit="event.preventDefault();">
<!-- Email Input -->
<div class="mb-md">
<label class="font-label-md text-label-md text-on-surface block mb-base" for="email">이메일</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined text-[18px]">mail</span>
</div>
<input class="w-full h-11 pl-[36px] pr-sm bg-surface-container-lowest border border-outline-variant rounded-DEFAULT font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-shadow" id="email" name="email" placeholder="name@clinic.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="mb-md">
<div class="flex justify-between items-center mb-base">
<label class="font-label-md text-label-md text-on-surface block" for="password">비밀번호</label>
<a class="font-label-sm text-label-sm text-secondary hover:text-on-secondary-fixed-variant transition-colors" href="#">비밀번호를 잊으셨나요?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined text-[18px]">lock</span>
</div>
<input class="w-full h-11 pl-[36px] pr-sm bg-surface-container-lowest border border-outline-variant rounded-DEFAULT font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-shadow" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center mb-xl">
<input class="h-4 w-4 rounded-sm border-outline-variant text-secondary focus:ring-secondary bg-surface-container-lowest cursor-pointer" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-base block font-body-sm text-body-sm text-on-surface-variant cursor-pointer" for="remember-me">
                    로그인 상태 유지
                </label>
</div>
<!-- Primary Action -->
<button class="w-full h-11 bg-primary text-on-primary font-label-md text-label-md rounded-lg hover:bg-inverse-surface transition-colors flex items-center justify-center gap-xs" type="submit">
<span>로그인</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
<!-- Divider -->
<div class="relative my-lg flex items-center py-xs">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink-0 mx-md font-label-sm text-label-sm text-outline">또는</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Secondary Action (Demo) -->
<button class="w-full h-11 bg-surface-container-lowest text-on-surface border border-outline-variant font-label-md text-label-md rounded-lg hover:bg-surface-container-low transition-colors flex items-center justify-center gap-sm" type="button">
<span class="material-symbols-outlined text-[18px]">laptop_mac</span>
<span>데모 환경으로 체험하기</span>
</button>
</form>
<!-- Security Footer -->
<div class="bg-surface-container-low border-t border-outline-variant px-xl py-sm flex justify-center items-center gap-base">
<span class="material-symbols-outlined text-[16px] text-tertiary-fixed-dim" style="font-variation-settings: 'FILL' 1;">shield_lock</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">HIPAA &amp; PHI 보안 규정 준수</span>
</div>
</main>
<!-- Simple Page Footer (Non-navigational) -->
<footer class="mt-lg text-center z-10 relative">
<p class="font-body-sm text-body-sm text-on-surface-variant">© 2024 ClinicalSup. 안전한 임상 환경.</p>
</footer>
</body></html>
